apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-app
  template:
    metadata:
      labels:
        app: ecommerce-app
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo waiting for db; sleep 2; done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis 6379; do echo waiting for redis; sleep 2; done
      containers:
        - name: ecommerce-app
          image: ecommerce-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3500
          envFrom:
            - secretRef:
                name: app-secret
            - configMapRef:
                name: app-config
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 35
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-app
spec:
  type: ClusterIP
  selector:
    app: ecommerce-app
  ports:
    - name: http
      port: 80
      targetPort: 3500
