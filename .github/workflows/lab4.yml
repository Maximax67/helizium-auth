name: Lab 4 Helm Grading

on: [push]

jobs:
  validate-helm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Create KinD cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: lab4
          wait: 60s

      - name: Run Master Validation Script
        run: |
          chmod +x ./test/lab4_test.sh
          ./test/lab4_test.sh
